  instruments:                      # Instruments for intraday scans
    - "NIFTY 50"
    - "NIFTY BANK"
  allowed_instruments:              # Runtime performance gate (deployment allowlist)
    - "NIFTY 50"
    - "NIFTY BANK"

# ---------------------------------------------------------------------------
# Multi-Account Paper Trading
# ---------------------------------------------------------------------------
multi_account:
  # Activated via --multi-account CLI flag
  accounts:
    - label: "micro_15k"
      capital: 15000
    - label: "starter_50k"
      capital: 50000
    - label: "growth_100k"
      capital: 100000
      risk_overrides:
        max_open_positions: 3
        drawdown_halt_pct: 15.0
    - label: "full_200k"
      capital: 200000
      risk_overrides:
        max_open_positions: 4
        drawdown_halt_pct: 15.0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  file: "logs/prometheus.log"
  max_size_mb: 50
  backup_count: 5
  trade_log: "logs/trades.log"
  signal_log: "logs/signals.log"
