        confluence_sideways: 3.2
        min_net_edge: 1.3
        min_rr: 2.0
        kelly_wr: 0.38
        target_atr_mult: 2.0
        time_stop_bars: 14
        max_daily_trades: 2
      tier2:
        confluence_trending: 2.9
        confluence_sideways: 3.6
        min_net_edge: 1.5
        min_rr: 2.0
        kelly_wr: 0.40
        target_atr_mult: 2.2
        time_stop_bars: 14
        max_daily_trades: 3
      tier3:
        confluence_trending: 2.8
        confluence_sideways: 3.5
        min_net_edge: 1.4
        min_rr: 1.9
        kelly_wr: 0.40
        target_atr_mult: 2.4
        time_stop_bars: 13
        max_daily_trades: 3
      tier4:
        confluence_trending: 2.7
        confluence_sideways: 3.3
        min_net_edge: 1.3
        min_rr: 1.8
        kelly_wr: 0.42
